name: enjoy_player
description: Cross-platform audio/video player for language learning with transcripts and shadow reading.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cross_file: ^0.3.5
  cached_network_image: ^3.4.1
  crypto: ^3.0.6
  async: ^2.13.0
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  file_picker: ^12.0.0-beta.1
  freezed_annotation: ^3.0.0
  flutter_riverpod: ^3.0.2
  flutter_secure_storage: ^8.1.0
  go_router: ^17.2.3
  http: ^1.4.0
  google_fonts: ^8.1.0
  intl: any
  json_annotation: ^4.9.0
  logging: ^1.3.0
  meta: ^1.16.0
  media_kit: ^1.2.2
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.0
  ffmpeg_kit_flutter_new: 4.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.2.0
  riverpod_annotation: ^4.0.0
  sqlite3_flutter_libs: ^0.5.28
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  palette_generator: ^0.3.3+7
  flutter_animate: ^4.5.2
  flutter_inappwebview: ^6.1.5
  flutter_svg: ^2.2.3
  skeletonizer: ^2.1.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.2
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  custom_lint: ^0.8.0
  drift_dev: ^2.26.0
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.0.2
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo-light.svg

name: enjoy_player
description: Cross-platform audio/video player for language learning with transcripts and shadow reading.
publish_to: 'none'
version: 0.3.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cross_file: ^0.3.5
  cached_network_image: ^3.4.1
  crypto: ^3.0.6
  archive: ^4.0.7
  async: ^2.13.0
  azure_speech:
    path: packages/azure_speech
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  # Pre-release dep (single-publisher supply chain) — pinned exactly so a
  # fresh `pub get` cannot upgrade without an explicit PR. See ADR-0029.
  file_picker: 12.0.0-beta.4
  freezed_annotation: ^3.0.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  go_router: ^17.2.3
  http: ^1.4.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logging: ^1.3.0
  meta: ^1.16.0
  media_kit: ^1.2.2
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.0
  ffmpeg_kit_flutter_new:
    path: packages/ffmpeg_kit_flutter_new
  path: ^1.9.1
  path_provider: ^2.1.5
  package_info_plus: ^10.1.0
  # Pre-release / single-publisher deps (Windows + mobile auto-update flow).
  # Pinned exactly so `pub get` cannot silently upgrade; bump via PR. See
  # ADR-0029.
  auto_updater: 0.2.1
  ota_update: 7.1.0
  record: ^7.0.0
  riverpod_annotation: ^4.0.2
  sqlite3_flutter_libs: ^0.5.28
  url_launcher: ^6.3.1
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1
  app_links: ^6.4.0
  uuid: ^4.5.1
  palette_generator: ^0.3.3+7
  flutter_animate: ^4.5.2
  flutter_inappwebview: ^6.1.5
  flutter_markdown: ^0.7.7+1
  flutter_svg: ^2.2.3
  qr_flutter: ^4.1.0
  share_plus: ^13.1.0
  skeletonizer: ^2.1.3
  window_manager: ^0.5.1
  ai_sdk_dart: 1.1.0
  ai_sdk_openai: 1.1.0
  ai_sdk_anthropic: 1.1.0
  ai_sdk_google: 1.1.0
  ai_sdk_provider: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.2
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.11.2
  riverpod_generator: ^4.0.0+1
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo-light.svg
    - assets/illustrations/
    - assets/discover/recommended_channels.json

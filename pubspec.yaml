name: enjoy_player
description: Cross-platform audio/video player for language learning with transcripts and shadow reading.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cross_file: ^0.3.5
  crypto: ^3.0.6
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  file_picker: ^8.1.7
  flutter_riverpod: ^3.0.2
  go_router: ^14.8.1
  intl: any
  logging: ^1.3.0
  meta: ^1.16.0
  media_kit: ^1.2.2
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^3.0.2
  sqlite3_flutter_libs: ^0.5.28
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  custom_lint: ^0.8.0
  drift_dev: ^2.26.0
  freezed: ^3.0.0
  freezed_annotation: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^3.0.2
  riverpod_lint: ^3.0.2

flutter:
  generate: true
  uses-material-design: true

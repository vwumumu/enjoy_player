name: Setup Flutter
description: >-
  Pin Flutter from .github/flutter-version without GitHub Actions cache.
  Installs into a persistent, version-keyed directory on the runner's local
  disk and skips the download entirely when that version is already there —
  self-hosted runners keep this across jobs, so Flutter is only fetched once
  per version bump.

runs:
  using: composite
  steps:
    - name: Read Flutter version (Unix)
      if: runner.os != 'Windows'
      id: flutter_version_unix
      shell: bash
      run: echo "version=$(tr -d ' \n\r' < .github/flutter-version)" >> "$GITHUB_OUTPUT"

    - name: Read Flutter version (Windows)
      if: runner.os == 'Windows'
      id: flutter_version_windows
      shell: pwsh
      run: |
        $version = (Get-Content -Path '.github/flutter-version' -Raw).Trim() -replace '\s', ''
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Install Flutter (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        # Avoid subosito/flutter-action here too: it re-downloads/reinstalls
        # every run (cache:false), which wastes bandwidth and time on a
        # self-hosted runner where the previous install already sits on
        # local disk. Mirror the Windows branch instead: install into a
        # persistent, version-keyed directory and skip the download when
        # it's already there.
        set -euo pipefail

        version="${{ steps.flutter_version_unix.outputs.version }}"
        cache_root="${RUNNER_TOOL_CACHE:-${RUNNER_TEMP:-/tmp}}"
        install_dir="$cache_root/flutter-$version-stable"
        flutter_root="$install_dir/flutter"
        flutter_bin="$flutter_root/bin/flutter"

        if [ ! -x "$flutter_bin" ]; then
          rm -rf "$install_dir"
          mkdir -p "$install_dir"

          case "${{ runner.os }}" in
            Linux)
              url="https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${version}-stable.tar.xz"
              archive="${RUNNER_TEMP:-/tmp}/flutter_linux_${version}-stable.tar.xz"
              curl -fsSL ${CURL_HTTP_VERSION:+--http1.1} -o "$archive" "$url"
              tar -xJf "$archive" -C "$install_dir"
              ;;
            macOS)
              arch_suffix=""
              if [ "${{ runner.arch }}" = "ARM64" ]; then
                arch_suffix="_arm64"
              fi
              url="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos${arch_suffix}_${version}-stable.zip"
              archive="${RUNNER_TEMP:-/tmp}/flutter_macos${arch_suffix}_${version}-stable.zip"
              curl -fsSL ${CURL_HTTP_VERSION:+--http1.1} -o "$archive" "$url"
              unzip -q "$archive" -d "$install_dir"
              ;;
            *)
              echo "::error::Unsupported runner.os for Flutter install: ${{ runner.os }}"
              exit 1
              ;;
          esac

          rm -f "$archive"
        fi

        if [ ! -x "$flutter_bin" ]; then
          echo "::error::Flutter $version was not installed at $flutter_root"
          exit 1
        fi

        echo "$flutter_root/bin" >> "$GITHUB_PATH"
        echo "FLUTTER_ROOT=$flutter_root" >> "$GITHUB_ENV"
        "$flutter_bin" --version

    - name: Install Flutter (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Avoid subosito/flutter-action here: its Bash installer can receive
        # unconverted Windows temp paths on self-hosted runners.
        $version = '${{ steps.flutter_version_windows.outputs.version }}'
        $cacheRoot = if ($env:RUNNER_TOOL_CACHE) { $env:RUNNER_TOOL_CACHE } else { $env:RUNNER_TEMP }
        $installDir = Join-Path $cacheRoot "flutter-windows-$version-stable"
        $flutterRoot = Join-Path $installDir 'flutter'
        $flutterBat = Join-Path $flutterRoot 'bin\flutter.bat'

        if (-not (Test-Path $flutterBat)) {
          Remove-Item -Path $installDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          $archive = Join-Path $env:RUNNER_TEMP "flutter_windows_$version-stable.zip"
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_$version-stable.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $installDir -Force
        }

        if (-not (Test-Path $flutterBat)) {
          throw "Flutter $version was not installed at $flutterRoot"
        }

        (Join-Path $flutterRoot 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "FLUTTER_ROOT=$flutterRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        & $flutterBat --version

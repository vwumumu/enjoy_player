name: Setup Flutter
description: Pin Flutter from .github/flutter-version without GitHub Actions cache.

runs:
  using: composite
  steps:
    - name: Read Flutter version
      id: flutter_version
      shell: node
      run: |
        const fs = require('fs');
        const version = fs.readFileSync('.github/flutter-version', 'utf8').replace(/\s/g, '');
        fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: ${{ steps.flutter_version.outputs.version }}
        cache: false

name: Release Android

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: Also build release APK (sideload)
        type: boolean
        default: true
  push:
    tags:
      - "v*"

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Android release
    runs-on: [self-hosted, Linux]
    env:
      # Set repository variable ANDROID_USE_RUNNER_KEYSTORE=true on self-hosted Linux
      # runners that already have android/key.properties + upload keystore on disk.
      ANDROID_USE_RUNNER_KEYSTORE: ${{ vars.ANDROID_USE_RUNNER_KEYSTORE || 'false' }}
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Linux tooling
        run: bash .github/scripts/ensure_linux_tooling.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ./.github/actions/setup-flutter

      - uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-35
            build-tools;35.0.0
          cache: false

      - name: Point Flutter at Android SDK
        run: |
          sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk" ]; then echo "::error::ANDROID_SDK_ROOT / ANDROID_HOME not set"; exit 1; fi
          flutter config --android-sdk "$sdk"

      - name: Pre-release checks
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash .github/scripts/setup_android_signing.sh

      - name: Build App Bundle (Play)
        run: flutter build appbundle --release

      - name: Build release APK
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.build_apk)
        run: flutter build apk --release

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK artifact
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.build_apk)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Clean up signing files
        if: always() && env.ANDROID_USE_RUNNER_KEYSTORE != 'true'
        run: rm -f android/key.properties android/ci-release-keystore.jks

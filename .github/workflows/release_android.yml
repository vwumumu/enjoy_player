name: Release Android

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: Also build per-ABI release APKs (sideload)
        type: boolean
        default: true
      publish:
        description: Upload sideload APKs + update feeds on dl.enjoy.bot
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Android release
    runs-on: [self-hosted, Linux]
    env:
      ANDROID_USE_RUNNER_KEYSTORE: ${{ vars.ANDROID_USE_RUNNER_KEYSTORE || 'false' }}
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Linux tooling
        run: bash .github/scripts/ensure_linux_tooling.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ./.github/actions/setup-flutter

      - uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-36
            build-tools;36.0.0

      - name: Point Flutter at Android SDK
        run: |
          sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk" ]; then echo "::error::ANDROID_SDK_ROOT / ANDROID_HOME not set"; exit 1; fi
          flutter config --android-sdk "$sdk"

      - name: Build Android release
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_apk }}" != "true" ]]; then
            args+=(--no-apk)
          fi
          bash .github/scripts/release_android.sh "${args[@]}"

      - name: Publish sideload feeds
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          PUBLISH_BUCKET: ${{ secrets.PUBLISH_BUCKET }}
          PUBLISH_PREFIX: player
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          RELEASE_REQUIRE_S3: "1"
        run: bash .github/scripts/release_android.sh --publish-only --publish

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/EnjoyPlayer-v*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK artifacts (per ABI)
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.build_apk)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: |
            build/app/outputs/flutter-apk/EnjoyPlayer-v*-armeabi-v7a.apk
            build/app/outputs/flutter-apk/EnjoyPlayer-v*-arm64-v8a.apk
            build/app/outputs/flutter-apk/EnjoyPlayer-v*-x86_64.apk
          if-no-files-found: error
          retention-days: 30

      - name: Clean up signing files
        if: always() && env.ANDROID_USE_RUNNER_KEYSTORE != 'true'
        run: rm -f android/key.properties android/ci-release-keystore.jks

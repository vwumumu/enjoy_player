name: Build Apple (iOS + macOS)

on:
  pull_request:
  push:
    branches: main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    name: iOS smoke
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-macos-runner-env

      - uses: ./.github/actions/setup-flutter

      - name: Flutter pub get
        run: flutter pub get

      - name: CocoaPods install (iOS)
        run: cd ios && pod install

      - name: Flutter build ios (debug, compile-only)
        run: bash .github/scripts/build_ios_ci.sh Debug

      - name: Flutter build ios (release, compile-only)
        run: bash .github/scripts/build_ios_ci.sh Release

  macos:
    name: macOS smoke
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-macos-runner-env

      - uses: ./.github/actions/setup-flutter

      - name: Install Homebrew deps (FFmpeg kit)
        run: brew bundle install --file=macos/Brewfile

      - name: Flutter pub get
        run: flutter pub get

      - name: CocoaPods install (macOS)
        run: cd macos && pod install

      - name: Flutter build macos (debug)
        run: bash .github/scripts/build_macos_ci.sh Debug

      - name: Flutter build macos (release, compile-only)
        run: bash .github/scripts/build_macos_ci.sh Release

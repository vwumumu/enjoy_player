name: Release Apple

on:
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: Upload iOS IPA to TestFlight
        type: boolean
        default: true
      notarize_macos:
        description: Notarize macOS .app for direct download
        type: boolean
        default: true
      publish:
        description: Upload macOS zip + update feeds on dl.enjoy.bot
        type: boolean
        default: false

concurrency:
  group: release-apple-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: iOS + macOS release
    runs-on: [self-hosted, macos, flutter]
    env:
      APPLE_USE_RUNNER_KEYCHAIN: ${{ vars.APPLE_USE_RUNNER_KEYCHAIN || 'true' }}
      NOTARY_PROFILE: enjoy-notary
      MACOS_APP_PATH: build/macos/Build/Products/Release/Enjoy Player.app
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-macos-runner-env

      - uses: ./.github/actions/setup-flutter

      - name: Build Apple release
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          MACOS_DEVELOPER_ID_CERT_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERT_BASE64 }}
          MACOS_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERT_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          args=()
          if [[ "${{ inputs.notarize_macos }}" == "true" ]]; then
            args+=(--notarize)
          fi
          if [[ "${{ inputs.upload_testflight }}" == "true" ]]; then
            args+=(--testflight)
          fi
          bash .github/scripts/release_apple.sh "${args[@]}"

      - name: Publish macOS direct-download feeds
        if: inputs.publish
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          PUBLISH_BUCKET: ${{ secrets.PUBLISH_BUCKET }}
          PUBLISH_PREFIX: player
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          RELEASE_REQUIRE_S3: "1"
        run: bash .github/scripts/release_apple.sh --publish-only --publish

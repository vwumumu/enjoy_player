name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - "landing/**"
  pull_request:
    paths:
      - "landing/**"
  workflow_dispatch:

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: ${{ github.event_name == 'pull_request' && 'Preview deploy' || 'Production deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy landing
            --project-name enjoy-player-landing
            ${{ github.event_name == 'pull_request' && format('--branch pr-{0}', github.event.pull_request.number) || '--branch main' }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Landing page preview deployed to Cloudflare Pages.'
            });

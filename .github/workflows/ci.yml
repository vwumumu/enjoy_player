name: CI

on:
  pull_request:
  push:
    branches: main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-test:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Linux tooling
        run: bash .github/scripts/ensure_linux_tooling.sh

      - uses: ./.github/actions/setup-flutter

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart format
        run: |
          set -euo pipefail
          paths=(lib test)
          for pkg in packages/*/; do
            [ -d "${pkg}lib" ] && paths+=("${pkg}lib")
            [ -d "${pkg}test" ] && paths+=("${pkg}test")
          done
          dart format --output=none --set-exit-if-changed "${paths[@]}"

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test (app)
        run: flutter test

      - name: Flutter test (path packages)
        run: |
          set -euo pipefail
          for pkg in packages/*/; do
            if [ -d "${pkg}test" ]; then
              (cd "$pkg" && flutter pub get && flutter test)
            fi
          done

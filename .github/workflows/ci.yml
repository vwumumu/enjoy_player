name: CI

on:
  pull_request:
    paths: &ci_paths
      - "lib/**"
      - "test/**"
      - "packages/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/flutter-version"
      - ".github/actions/setup-flutter/**"
      - ".github/scripts/ensure_linux_tooling.sh"
      - ".github/scripts/check_no_new_path_deps.sh"
      - ".github/scripts/check_coverage_gate.sh"
      - ".github/workflows/ci.yml"
  push:
    branches: main
    paths: *ci_paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-test:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Linux tooling
        run: bash .github/scripts/ensure_linux_tooling.sh

      - uses: ./.github/actions/setup-flutter

      - name: Flutter pub get
        run: flutter pub get

      - name: Forbid new local-path packages
        run: bash .github/scripts/check_no_new_path_deps.sh

      - name: Dart format
        run: |
          set -euo pipefail
          paths=(lib test)
          for pkg in packages/*/; do
            [ -d "${pkg}lib" ] && paths+=("${pkg}lib")
            [ -d "${pkg}test" ] && paths+=("${pkg}test")
          done
          dart format --output=none --set-exit-if-changed "${paths[@]}"

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test (app, with coverage)
        run: flutter test --coverage

      - name: Coverage gate (line baseline)
        run: bash .github/scripts/check_coverage_gate.sh coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Flutter test (path packages)
        run: |
          set -euo pipefail
          for pkg in packages/*/; do
            if [ -d "${pkg}test" ]; then
              (cd "$pkg" && flutter pub get && flutter test)
            fi
          done

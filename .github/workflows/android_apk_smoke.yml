name: Android APK smoke

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apk:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Linux tooling
        run: bash .github/scripts/ensure_linux_tooling.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ./.github/actions/setup-flutter

      - uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-36
            build-tools;36.0.0
          cache: false

      - name: Point Flutter at Android SDK
        run: |
          sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk" ]; then echo "::error::ANDROID_SDK_ROOT / ANDROID_HOME not set"; exit 1; fi
          flutter config --android-sdk "$sdk"

      - name: Flutter pub get
        run: |
          flutter pub get
          bash tool/patch_agp9_pub_plugins.sh

      - name: Flutter build apk (debug)
        run: flutter build apk --debug

      - name: Flutter build apk (release, compile-only, split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Flutter build appbundle (release, compile-only)
        run: flutter build appbundle --release

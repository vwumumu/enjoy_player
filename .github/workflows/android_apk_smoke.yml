name: Android APK smoke

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Read Flutter version
        id: flutter_version
        run: echo "version=$(tr -d ' \n\r' < .github/flutter-version)" >> "$GITHUB_OUTPUT"

      - uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-35
            build-tools;35.0.0
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Point Flutter at Android SDK
        run: |
          sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk" ]; then echo "::error::ANDROID_SDK_ROOT / ANDROID_HOME not set"; exit 1; fi
          flutter config --android-sdk "$sdk"

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build apk (debug)
        run: flutter build apk --debug

      - name: Flutter build apk (release, compile-only)
        run: flutter build apk --release

      - name: Flutter build appbundle (release, compile-only)
        run: flutter build appbundle --release

name: Android APK smoke

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apk:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Linux tooling
        run: bash .github/scripts/ensure_linux_tooling.sh

      - uses: ./.github/actions/setup-flutter

      - name: Ensure Android SDK
        run: bash .github/scripts/ensure_android_env.sh

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build apk (debug)
        run: flutter build apk --debug

      - name: Flutter build apk (release, compile-only)
        run: flutter build apk --release

      - name: Flutter build appbundle (release, compile-only)
        run: flutter build appbundle --release

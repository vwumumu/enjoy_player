name: Release Windows

on:
  workflow_dispatch:
    inputs:
      build_installer:
        description: Build Inno Setup installer (EnjoyPlayerSetup-vX.Y.Z.exe)
        type: boolean
        default: true
      publish:
        description: Upload artifacts + update feeds on dl.enjoy.bot
        type: boolean
        default: false

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Windows release
    runs-on: [self-hosted, windows, flutter]
    steps:
      - uses: actions/checkout@v6

      - name: Short workspace path (Windows MAX_PATH)
        shell: pwsh
        run: .github/scripts/use_short_windows_workdir.ps1

      - uses: ./.github/actions/setup-flutter

      - name: Build Windows release
        shell: bash
        run: |
          args=()
          if [[ "${{ inputs.build_installer }}" != "true" ]]; then
            args+=(--no-installer)
          fi
          bash .github/scripts/release_windows.sh "${args[@]}"

      - name: Publish direct-download feeds
        if: inputs.publish
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          PUBLISH_BUCKET: ${{ secrets.PUBLISH_BUCKET }}
          PUBLISH_PREFIX: player
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          SPARKLE_DSA_PRIV_PEM_BASE64: ${{ secrets.SPARKLE_DSA_PRIV_PEM_BASE64 }}
          RELEASE_REQUIRE_S3: "1"
        run: bash .github/scripts/release_windows.sh --publish-only --publish

      - name: Remove short workspace drive mapping
        if: always()
        shell: pwsh
        run: |
          if (Test-Path 'W:\') { subst W: /d }

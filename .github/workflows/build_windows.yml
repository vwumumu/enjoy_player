name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-flutter

      - name: Ensure NuGet feed (WebView2 / flutter_inappwebview)
        shell: pwsh
        run: .github/scripts/ensure_nuget_feed.ps1

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Windows FFmpeg
        shell: pwsh
        run: windows/scripts/fetch_ffmpeg.ps1

      - name: Flutter build windows (debug)
        run: flutter build windows --debug

      - name: Flutter build windows (release)
        run: flutter build windows --release

name: Build Windows

on:
  pull_request:
    paths: &build_windows_paths
      - "lib/**"
      - "packages/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - "windows/**"
      - ".github/flutter-version"
      - ".github/actions/setup-flutter/**"
      - ".github/scripts/use_short_windows_workdir.ps1"
      - ".github/scripts/ensure_nuget_feed.ps1"
      - ".github/workflows/build_windows.yml"
  push:
    branches: [main, master]
    paths: *build_windows_paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: [self-hosted, windows, flutter]
    steps:
      - uses: actions/checkout@v6

      - name: Short workspace path (Windows MAX_PATH)
        shell: pwsh
        run: .github/scripts/use_short_windows_workdir.ps1

      - uses: ./.github/actions/setup-flutter

      - name: Ensure NuGet feed (WebView2 / flutter_inappwebview)
        shell: pwsh
        run: .github/scripts/ensure_nuget_feed.ps1

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Windows FFmpeg
        shell: pwsh
        run: windows/scripts/fetch_ffmpeg.ps1

      - name: Flutter build windows (debug)
        run: flutter build windows --debug

      - name: Flutter build windows (release)
        run: flutter build windows --release

      - name: Remove short workspace drive mapping
        if: always()
        shell: pwsh
        run: |
          if (Test-Path 'W:\') { subst W: /d }

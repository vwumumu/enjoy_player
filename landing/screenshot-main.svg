<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13131E" />
      <stop offset="100%" stop-color="#08080E" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4797F5" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="brand-grad-solid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4797F5" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Window -->
  <rect width="1200" height="750" rx="16" fill="url(#bg-grad)" stroke="#1E1E30" stroke-width="2"/>
  
  <!-- Top Bar -->
  <path d="M0 16C0 7.16344 7.16344 0 16 0H1184C1192.84 0 1200 7.16344 1200 16V48H0V16Z" fill="#101018" />
  <circle cx="24" cy="24" r="6" fill="#FF5F56" />
  <circle cx="44" cy="24" r="6" fill="#FFBD2E" />
  <circle cx="64" cy="24" r="6" fill="#27C93F" />
  
  <!-- Sidebar -->
  <rect x="0" y="48" width="240" height="702" fill="#0C0C14" />
  <rect x="24" y="72" width="140" height="20" rx="4" fill="#1E1E30" />
  <rect x="24" y="112" width="192" height="12" rx="4" fill="#1E1E30" opacity="0.5" />
  <rect x="24" y="140" width="160" height="12" rx="4" fill="#1E1E30" opacity="0.5" />
  <rect x="24" y="168" width="176" height="12" rx="4" fill="#1E1E30" opacity="0.5" />
  
  <!-- Main Content Area -->
  <!-- Video Player Placeholder -->
  <rect x="280" y="88" width="880" height="420" rx="12" fill="#08080E" stroke="#1E1E30" stroke-width="1" />
  
  <!-- Play Button / Center Icon -->
  <circle cx="720" cy="298" r="40" fill="url(#brand-grad-solid)" opacity="0.8" filter="url(#glow)" />
  <path d="M712 282L736 298L712 314V282Z" fill="#FFFFFF" />

  <!-- Video Controls -->
  <rect x="300" y="470" width="840" height="4" rx="2" fill="#1E1E30" />
  <rect x="300" y="470" width="340" height="4" rx="2" fill="url(#brand-grad-solid)" />
  <circle cx="640" cy="472" r="6" fill="#FFFFFF" />

  <!-- Transcript Area -->
  <rect x="280" y="540" width="880" height="170" rx="12" fill="url(#brand-grad)" stroke="#1E1E30" stroke-width="1" />
  
  <!-- Transcript Lines -->
  <rect x="320" y="570" width="600" height="16" rx="4" fill="#FFFFFF" opacity="0.9" />
  <rect x="320" y="600" width="450" height="16" rx="4" fill="#FFFFFF" opacity="0.5" />
  <rect x="320" y="630" width="700" height="16" rx="4" fill="#FFFFFF" opacity="0.3" />
  
  <!-- Highlighted Word in Transcript -->
  <rect x="420" y="566" width="120" height="24" rx="4" fill="url(#brand-grad-solid)" opacity="0.4" />
</svg>

<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#08080E"/>
  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#4797F5" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#4797F5" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo (centered, top-left quadrant) -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4797F5"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <g transform="translate(440, 160) scale(1.6)" stroke="url(#grad)" stroke-width="5" stroke-linejoin="round">
    <polygon points="30,20 70,40 30,60" fill="url(#grad)" opacity="0.35"/>
    <polygon points="30,40 70,60 30,80" fill="url(#grad)" opacity="0.65"/>
    <polygon points="50,30 90,50 50,70" fill="url(#grad)" opacity="1.0"/>
  </g>

  <!-- Title -->
  <text x="600" y="395" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="72" letter-spacing="-2" fill="url(#grad)">Enjoy Player</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="28" fill="#888899">A cross-platform language-learning player</text>
</svg>

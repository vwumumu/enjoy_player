name: azure_speech
description: >
  Flutter plugin wrapping the Microsoft Azure Cognitive Services Speech SDK
  on Android, iOS, macOS, and Windows. Pronunciation assessment is implemented
  first; additional Speech SDK features may be added incrementally.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.12.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.11.0
  meta: ^1.16.0
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  build_runner: ^2.5.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.2

flutter:
  plugin:
    platforms:
      android:
        package: dev.enjoy_player.azure_speech
        pluginClass: AzureSpeechPlugin
      ios:
        pluginClass: AzureSpeechPlugin
      macos:
        pluginClass: AzureSpeechPlugin
      windows:
        pluginClass: AzureSpeechPluginCApi
